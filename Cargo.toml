[package]
name = "schema"
version = "0.0.0"
edition = "2024"

[workspace]
members = ["schema-macros"]

[features]
default = ["std", "macros"]
std = ["serde/std"]
macros = ["dep:schema-macros"]

[dependencies]
schema-macros = { path = "schema-macros", optional = true }
serde = { version = "1.0.228", default-features = false, features = ["derive"] }

[dev-dependencies]
postcard = "1.1.3"
rstest = "0.26.1"
serde_json = "1.0.149"
yaml_serde = "0.10.4"
