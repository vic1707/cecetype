[package]
name = "schema"
version = "0.0.0"
edition = "2021"

[workspace]
members = ["schema-macros"]

[features]
default = ["alloc", "macros"]
alloc = ["serde/alloc"]
macros = ["dep:schema-macros"]

[dependencies]
schema-macros = { path = "schema-macros", optional = true }
serde = { version = "1.0.228", default-features = false, features = ["derive"] }
derive-where = { version = "1.6.1", default-features = false }

[dev-dependencies]
postcard = { version = "1.1.3", features = ["use-std"] }
rmp-serde = "1.3.1"
rstest = "0.26.1"
serde_cbor = "0.11.2"
serde_json = "1.0.149"
yaml_serde = "0.10.4"
